name: Build and push Docker image

# Construit l'image Odoo personnalisée et la pousse sur Harbor.
#
# Configuration (onglet Settings → Secrets and variables → Actions) :
#   Secrets   : HARBOR_PASSWORD          (obligatoire)
#               HARBOR_USERNAME          (si pas défini en Variable)
#   Variables : HARBOR_REGISTRY          (déf. public-harbor.gottaphish.com)
#               HARBOR_PROJECT           (déf. startuppack)
#               HARBOR_USERNAME          (déf. startuppack ; sinon secret)
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Optional image tag to publish
        required: false
        type: string

env:
  REGISTRY: ${{ vars.HARBOR_REGISTRY || 'public-harbor.gottaphish.com' }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'startuppack' }}

jobs:
  docker:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          CUSTOM_TAG: ${{ inputs.tag }}
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${HARBOR_PROJECT}/${image_name}"
          short_sha="${GITHUB_SHA::7}"
          # Tag = nom de la branche (les '/' éventuels -> '-' pour rester valide).
          branch_tag="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"

          # Tags publiés : <sha7> + <branche> (ex. main) + latest sur main.
          tags="${image}:${short_sha},${image}:${branch_tag}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            tags="${tags},${image}:latest"
          fi
          if [[ -n "${CUSTOM_TAG}" ]]; then
            tags="${tags},${image}:${CUSTOM_TAG}"
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.HARBOR_USERNAME || secrets.HARBOR_USERNAME || 'startuppack' }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
