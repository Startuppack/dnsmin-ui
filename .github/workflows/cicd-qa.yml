name: 'CI/CD - QA'

concurrency: dnsmin-ui-qa

on:
  workflow_dispatch:
  push:
    branches:
      - qa
    paths:
      - '.github/workflows/cicd-qa.yml'
      - 'deploy/**'
      - 'src/**'
      - '.dockerignore'
      - '.gitignore'
      - 'docker-compose.qa.yml'
      - 'sync-exclusions.txt'

jobs:
  deploy-api:
    name: Deploy Service
    runs-on: qa
    environment: qa
    permissions: write-all
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Deploy Application

      - name: Copying Application Files
        id: copy
        shell: bash
        run: |
          rsync -a --delete --ignore-errors --exclude-from='./sync-exclusions.txt' ./ /srv/stacks/dnsmin-ui

      - name: Building Updated Images
        id: build
        shell: bash
        run: |
          cd /srv/stacks/dnsmin-ui
          docker compose -f docker-compose.${{ vars.ENVIRONMENT }}.yml build

      - name: Deploying Updated Images
        id: deploy
        shell: bash
        run: |
          cd /srv/stacks/dnsmin-ui
          docker compose -f docker-compose.${{ vars.ENVIRONMENT }}.yml stop web
          docker compose -f docker-compose.${{ vars.ENVIRONMENT }}.yml up web -d
