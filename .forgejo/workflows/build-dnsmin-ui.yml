# Build CI migré vers Forgejo Actions (org intern) + PODMAN — remplace GitHub
# Actions (billing bloqué). DOCKER_BUILDKIT=0 force le builder classique (API
# /build implémentée par podman ; buildkit/buildx n'est pas supporté par podman).
#
# Image/tags STRICTEMENT identiques à l'ancien GitHub Actions
# (.github/workflows/harbor-build-push.yml). Dockerfile dans deploy/docker/.
name: build-dnsmin-ui
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: podman
    env:
      DOCKER_BUILDKIT: "0"
    steps:
      - uses: actions/checkout@v4
      - name: Build + push (podman, builder classique)
        run: |
          set -e
          REG="${{ secrets.HARBOR_REGISTRY }}"; IMG="$REG/startuppack/dnsmin-ui"
          SHORT="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME//\//-}"
          PUSH_TAGS="$SHORT $BRANCH"
          if [ "$GITHUB_REF_NAME" = "main" ]; then PUSH_TAGS="$PUSH_TAGS latest"; fi
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "$REG" -u "${{ secrets.HARBOR_USER }}" --password-stdin
          BUILD_TAGS=""
          for t in $PUSH_TAGS; do BUILD_TAGS="$BUILD_TAGS -t $IMG:$t"; done
          DOCKER_BUILDKIT=0 docker build -f deploy/docker/Dockerfile $BUILD_TAGS .
          for t in $PUSH_TAGS; do docker push "$IMG:$t"; done
          echo "OK: pushed $IMG ($PUSH_TAGS) (moteur podman)"
